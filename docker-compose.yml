version: '3.8'

services:
  myjourney-app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: myjourney-staging
    ports:
      - "80:80"
    restart: unless-stopped
    environment:
      - NODE_ENV=staging
    volumes:
      # Optionnel: pour persister les logs
      - ./logs:/var/log/nginx
    networks:
      - myjourney-network

networks:
  myjourney-network:
    driver: bridge